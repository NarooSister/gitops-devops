namespace:
  name: my-api

replicaCount: 2

image:
  repository: ghcr.io/naroosister/gitops-devops/my-api
  tag: 5c40baf
  pullPolicy: IfNotPresent

app:
  env: dev
  message: "Hello from Helm values"
  ready: "true"
  version: "v2"  

secret:
  message: "helm-secret"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: my-api.localhost
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

probes:
  readiness:
    path: /healthz/ready
    initialDelaySeconds: 3
    periodSeconds: 5
  liveness:
    path: /healthz/live
    initialDelaySeconds: 10
    periodSeconds: 10
